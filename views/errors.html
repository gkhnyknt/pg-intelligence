<div class="p-4">
    <div class="flex items-center justify-between mb-3">
        <div>
            <h2 class="text-sm font-bold text-rose-600 dark:text-rose-400">PostgreSQL Error Logs</h2>
            <p class="text-[10px] text-slate-500 mt-0.5">Diskteki CSV log dosyalarından ERROR, FATAL ve PANIC kayıtları okunur.</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400">Log Dosyası Seç:</span>
            <select id="logFileSelect" onchange="window.loadLogContent(this.value)" class="w-64 text-[10px] font-bold bg-white dark:bg-[#0d1424] border border-slate-200 dark:border-[#1a2540] text-slate-700 dark:text-slate-300 rounded-md px-2 py-1.5 outline-none cursor-pointer focus:border-[#336791] transition-colors">
                <option value="">Yükleniyor...</option>
            </select>
        </div>
    </div>
    <div class="glass rounded-xl overflow-hidden">
        <div class="overflow-x-auto max-h-[calc(100vh-200px)]">
            <table class="data-table w-full">
                <thead><tr>
                    <th>Zaman</th><th>Seviye</th><th>Kullanıcı</th>
                    <th>Veritabanı</th><th class="w-full">Hata Mesajı</th><th>İşlem</th>
                </tr></thead>
                <tbody id="tbodyErrorLogs"></tbody>
            </table>
        </div>
    </div>
</div>
